<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU textile DPP — field schema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --snow:    #FAF9F7;
      --snow2:   #F2F0ED;
      --snow3:   #E8E5E1;
      --earth:   #290800;
      --earth2:  #4a1400;
      --earth3:  #7a3a20;
      --scarlet: #FF3300;
      --s10:     rgba(255,51,0,.10);
      --s20:     rgba(255,51,0,.20);
      --border:  rgba(41,8,0,.13);
      --border2: rgba(41,8,0,.07);
      --white:   #ffffff;
      --shadow:  0 1px 3px rgba(41,8,0,.07), 0 4px 14px rgba(41,8,0,.04);
      --shadow-md: 0 2px 6px rgba(41,8,0,.09), 0 10px 30px rgba(41,8,0,.06);
      --sidebar: 220px;
      --max:     1100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: var(--snow); color: var(--earth); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6; }

    /* ── Top bar ── */
    .topbar { background: var(--earth); height: 48px; display: flex; align-items: center; position: sticky; top: 0; z-index: 200; }
    .topbar .w { max-width: var(--max); margin: 0 auto; padding: 0 32px; width: 100%; display: flex; align-items: center; gap: 0; }
    .topbar-title { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
    .topbar-nav { display: flex; align-items: center; gap: 2px; margin-left: auto; }
    .topbar-link { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.55); text-decoration: none; padding: 5px 12px; border-radius: 4px; transition: all .15s; white-space: nowrap; }
    .topbar-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .topbar-link.current { color: #fff; background: rgba(255,255,255,0.12); }
    .topbar-right { display: flex; align-items: center; gap: 8px; margin-left: 12px; }
    .pill {
      font-size: 10px; font-weight: 600; padding: 3px 9px;
      border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
    }
    .pill-draft { background: rgba(255,51,0,0.25); color: #ff8866; border-color: rgba(255,51,0,0.4); }
    .burger {
      display: none; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.2); background: transparent;
      cursor: pointer; color: rgba(255,255,255,0.7);
    }
    .burger:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Header hidden ── */
    header { display: none; }

    /* ── Layout ── */
    .layout {
      max-width: var(--max); margin: 0 auto; padding: 0 32px;
      display: grid; grid-template-columns: var(--sidebar) 1fr; gap: 0;
      align-items: start;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky; top: 48px;
      height: calc(100vh - 48px); overflow-y: auto; overflow-x: hidden;
      padding: 28px 20px 28px 0; border-right: 1px solid var(--border);
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--snow3); border-radius: 2px; }

    .sb-label {
      font-size: 11px; font-weight: 600; color: var(--earth3);
      margin-bottom: 10px; padding-left: 2px;
    }
    .sb-divider { height: 1px; background: var(--border2); margin: 16px 0; }

    .nav-link {
      display: flex; align-items: baseline; gap: 8px;
      padding: 6px 8px; border-radius: 5px; text-decoration: none;
      color: var(--earth2); font-size: 12px; transition: all .15s;
      border-left: 2px solid transparent; margin-left: -2px;
    }
    .nav-link:hover  { background: var(--snow2); color: var(--earth); }
    .nav-link.active { background: var(--s10); color: var(--scarlet); border-left-color: var(--scarlet); font-weight: 500; }
    .nav-num  { font-size: 10px; color: var(--earth3); min-width: 14px; font-weight: 600; }
    .nav-link.active .nav-num { color: var(--scarlet); }

    .sb-stats { padding: 2px 0; }
    .sb-stat  { display: flex; justify-content: space-between; padding: 4px 8px; font-size: 11px; }
    .sb-stat span:first-child { color: var(--earth3); }
    .sb-stat span:last-child  { font-weight: 600; color: var(--earth); }

    .sb-link  { display: block; padding: 4px 8px; font-size: 11px; font-weight: 600; color: var(--scarlet); text-decoration: none; }
    .sb-link:hover { text-decoration: underline; }

    /* ── Main ── */
    main { padding: 32px 0 80px 40px; }

    /* ── Intro ── */
    .intro {
      margin-bottom: 40px; padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .intro h1 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; color: var(--earth); margin-bottom: 10px; }
    .intro p  { font-size: 13px; color: var(--earth3); line-height: 1.7; max-width: 560px; margin-bottom: 20px; }

    .legend { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .leg-card {
      background: var(--snow2); border-radius: 8px; padding: 14px 16px;
    }
    .leg-title { font-size: 11px; font-weight: 600; color: var(--earth3); margin-bottom: 10px; }
    .leg-item  { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; color: var(--earth2); }
    .leg-item:last-child { margin-bottom: 0; }

    /* ── Schema sections ── */
    .schema-section { margin-bottom: 44px; }
    .sec-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .sec-title { font-size: 13px; font-weight: 700; color: var(--earth3); }
    .sec-count { font-size: 11px; color: var(--earth3); }

    .field-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Field card ── */
    .field-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
      box-shadow: var(--shadow); transition: box-shadow .15s, border-color .15s;
    }
    .field-card:hover { box-shadow: var(--shadow-md); border-color: rgba(41,8,0,.22); }

    .field-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; padding: 14px 16px 12px;
      background: var(--snow); border-bottom: 1px solid var(--border2);
    }
    .field-id-name { display: flex; align-items: baseline; gap: 8px; }
    .field-id   { font-size: 11px; font-weight: 600; color: var(--earth3); min-width: 26px; font-family: monospace; }
    .field-name { font-size: 13px; font-weight: 600; color: var(--earth); font-family: monospace; }
    .field-badges { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; }

    .field-desc  { padding: 13px 16px; font-size: 12.5px; color: var(--earth2); line-height: 1.7; }
    .field-basis { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 5px; }

    /* ── Properties / items ── */
    .field-props, .field-items { border-top: 1px solid var(--border2); }

    .sub-label {
      font-size: 11px; font-weight: 600; color: var(--earth3);
      padding: 9px 16px 6px; background: var(--snow);
      border-bottom: 1px solid var(--border2);
    }

    .prop-row {
      padding: 8px 16px; border-bottom: 1px solid var(--border2); font-size: 12px;
    }
    .prop-row:last-child { border-bottom: none; }
    .prop-meta  { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
    .prop-name  { font-weight: 600; color: var(--earth); font-family: monospace; font-size: 12px; }
    .prop-type  { font-size: 11px; color: var(--earth3); }
    .prop-desc  { font-size: 11.5px; color: var(--earth3); line-height: 1.55; margin-top: 2px; }
    .prop-enum  { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .prop-enum code {
      font-family: monospace; font-size: 10px; padding: 2px 6px;
      background: var(--snow2); border: 1px solid var(--border);
      border-radius: 3px; color: var(--earth2);
    }
    .nested { margin-top: 6px; padding-left: 12px; border-left: 2px solid var(--border); }

    /* ── Badges ── */
    .badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 4px; white-space: nowrap;
    }
    .b-m1     { background: #e7f4ec; color: #237a3c; }
    .b-m2     { background: #f5eddb; color: #7a5010; }
    .b-m3     { background: #e8edf8; color: #1a5ca8; }
    .b-m4     { background: var(--snow2); color: var(--earth3); }
    .b-public { background: #e8edf8; color: #1a5ca8; }
    .b-auth   { background: var(--s10); color: var(--scarlet); }
    .b-legit  { background: #f0eaf8; color: #5c2d8a; }
    .b-static  { background: var(--snow2); color: var(--earth3); }
    .b-dynamic { background: #f5eddb; color: #7a5010; }
    .b-req    { background: var(--s10); color: var(--scarlet); }
    .b-req-inline {
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; background: var(--s10); color: var(--scarlet);
    }

    /* ── Reg tags ── */
    .reg-tag {
      font-size: 10px; font-family: monospace; color: var(--earth3);
      background: var(--snow); border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 3px;
    }

    /* ── Discuss button ── */
    .discuss-b {
      display: flex; justify-content: flex-end;
      padding: 0 16px 12px;
    }
    .discuss-b a {
      font-size: 10px; font-weight: 600; color: var(--earth3);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 3px 10px; text-decoration: none; background: var(--snow);
    }
    .discuss-b a:hover { border-color: var(--scarlet); color: var(--scarlet); }

    /* ── Loading / error states ── */
    .state {
      display: flex; align-items: center; justify-content: center;
      min-height: 40vh; font-size: 13px; color: var(--earth3);
    }
    .state-error { color: var(--scarlet); }

    /* ── Mobile drawer ── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(41,8,0,.25);
    }
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 400;
      width: 280px; background: var(--white); border-right: 1px solid var(--border);
      padding: 20px 16px; overflow-y: auto;
      transform: translateX(-100%); transition: transform .22s ease;
    }
    .drawer-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }
    .drawer-hd span { font-size: 13px; font-weight: 600; color: var(--earth); }
    .drawer-close {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
      background: var(--snow); color: var(--earth3); font-size: 14px;
    }
    .open { display: block; }
    .drawer.open { transform: translateX(0); }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 20px 32px;
      max-width: var(--max); margin: 0 auto;
      font-size: 11px; color: var(--earth3);
    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .layout  { grid-template-columns: 1fr; padding: 0 16px; }
      .sidebar { display: none; }
      main     { padding: 24px 0 60px; }
      .legend  { grid-template-columns: 1fr; }
      .field-head { flex-direction: column; gap: 8px; }
      .field-badges { justify-content: flex-start; }
      .burger  { display: flex; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="w">
    <span class="topbar-title">EU textile DPP — field schema</span>
    <nav class="topbar-nav">
      <a class="topbar-link" href="../../index.html">Legislation tracker</a>
      <a class="topbar-link current" href="schema.html">Textile schema</a>
      <a class="topbar-link" href="responsibility_matrix.html">Responsibility matrix</a>
    </nav>
    <div class="topbar-right">
      <span class="pill" id="hd-version"></span>
      <span class="pill pill-draft" id="hd-status"></span>
      <button class="burger" id="burgerBtn" aria-label="Open navigation">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="4.5" x2="14" y2="4.5"/>
          <line x1="2" y1="8"   x2="14" y2="8"/>
          <line x1="2" y1="11.5" x2="14" y2="11.5"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main id="main"><div class="state">Loading schema…</div></main>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hd">
    <span>Sections</span>
    <button class="drawer-close" id="drawerClose">✕</button>
  </div>
  <div id="drawerNav"></div>
</div>

<footer>
  <div class="site-footer">
    Started by <a href="https://traceaware.io" target="_blank" rel="noopener" style="color:var(--earth3);font-weight:600;text-decoration:none;">AWARE™</a>. Open for contribution — <a href="https://github.com/rhys-the-davies/open-dpp" target="_blank" rel="noopener" style="color:var(--earth3);text-decoration:none;">view on GitHub ↗</a>
  </div>
</footer>

<script>
// ── Config ──────────────────────────────────────────────────────────────────

const SCHEMA_URL = 'schema.json';
const DISCUSS_URL = 'https://github.com/rhys-the-davies/open-dpp/discussions';

const MANDATE = {
  M1: { cls: 'b-m1', label: 'M1 — required now' },
  M2: { cls: 'b-m2', label: 'M2 — delegated act pending' },
  M3: { cls: 'b-m3', label: 'M3 — non-ESPR instrument' },
  M4: { cls: 'b-m4', label: 'M4 — voluntary' },
};

const ACCESS = {
  public:                  { cls: 'b-public', label: 'Public' },
  authorities:             { cls: 'b-auth',   label: 'Authorities only' },
  legitimate_interest:     { cls: 'b-legit',  label: 'Legitimate interest' },
  delegated_act_will_specify: { cls: 'b-m4',  label: 'TBD' },
};

const BEHAVIOUR = {
  static:  { cls: 'b-static',  label: 'Static' },
  dynamic: { cls: 'b-dynamic', label: 'Dynamic' },
};

// ── Helpers ──────────────────────────────────────────────────────────────────

const el = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls)  e.className = cls;
  if (html) e.innerHTML = html;
  return e;
};

const badge = (map, key) => {
  const cfg = map[key] || { cls: 'b-m4', label: key };
  return `<span class="badge ${cfg.cls}">${cfg.label}</span>`;
};

const sectionId = name =>
  'sec-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

// ── Renderers ────────────────────────────────────────────────────────────────

function renderPropRow(key, val, required = false) {
  const type  = [val.type, val.format, val.minimum != null && val.maximum != null
    ? `${val.minimum}–${val.maximum}` : val.minimum != null
    ? `min ${val.minimum}` : null].filter(Boolean).join(' · ');

  const typeStr = val.type === 'array' && val.items?.type === 'string'
    ? 'array of strings' : type;

  const enumHtml = val.enum
    ? `<div class="prop-enum">${val.enum.map(e => `<code>${e}</code>`).join('')}</div>` : '';

  const nestedHtml = val.type === 'object' && val.properties
    ? `<div class="nested">${renderProps(val.properties)}</div>` : '';

  const reqBadge = required ? '<span class="b-req-inline">required</span>' : '';

  return `<div class="prop-row">
    <div class="prop-meta">
      <span class="prop-name">${key}</span>
      ${reqBadge}
      <span class="prop-type">${typeStr}</span>
    </div>
    ${val.description ? `<div class="prop-desc">${val.description}</div>` : ''}
    ${enumHtml}
    ${nestedHtml}
  </div>`;
}

function renderProps(props, requiredKeys = []) {
  return Object.entries(props)
    .map(([k, v]) => renderPropRow(k, v, requiredKeys.includes(k)))
    .join('');
}

function renderField(f) {
  const card = el('div', 'field-card');
  card.id = 'f-' + f.field_id.replace(/\./g, '--');

  // Header
  const head = el('div', 'field-head');
  head.innerHTML = `
    <div class="field-id-name">
      <span class="field-id">${f.field_id}</span>
      <span class="field-name">${f.field_name}</span>
    </div>
    <div class="field-badges">
      ${badge(MANDATE, f.mandate_status)}
      ${badge(ACCESS, f.access_tier)}
      ${badge(BEHAVIOUR, f.data_behaviour)}
      ${f.required ? '<span class="badge b-req">Required</span>' : ''}
    </div>`;
  card.appendChild(head);

  // Description
  const desc = el('div', 'field-desc', f.description);
  card.appendChild(desc);

  // Regulatory basis
  if (f.regulatory_basis?.length) {
    const basis = el('div', 'field-basis',
      f.regulatory_basis.map(r => `<span class="reg-tag">${r}</span>`).join(''));
    card.appendChild(basis);
  }

  // Object properties
  if (f.properties) {
    const wrap = el('div', 'field-props');
    wrap.innerHTML = `<div class="sub-label">Fields</div>${renderProps(f.properties)}`;
    card.appendChild(wrap);
  }

  // Array items
  if (f.items?.type === 'object' && f.items.properties) {
    const wrap = el('div', 'field-items');
    wrap.innerHTML = `<div class="sub-label">Each item in this list contains</div>
      <div>${renderProps(f.items.properties, f.items.required || [])}</div>`;
    card.appendChild(wrap);
  }

  // Discuss button — links to GitHub discussions, pre-fills field name as title
  const footer = el('div', 'discuss-b');
  const discussTitle = encodeURIComponent(f.field_name);
  footer.innerHTML = `<a href="${DISCUSS_URL}/new?category=general&title=${discussTitle}" target="_blank" rel="noopener">Discuss ↗</a>`;
  card.appendChild(footer);

  return card;
}

function renderSection(name, fields) {
  const section = el('section', 'schema-section');
  section.id = sectionId(name);

  const header = el('div', 'sec-header');
  header.innerHTML = `
    <span class="sec-title">${name}</span>
    <span class="sec-count">${fields.length} field${fields.length !== 1 ? 's' : ''}</span>`;
  section.appendChild(header);

  const list = el('div', 'field-list');
  fields.forEach(f => list.appendChild(renderField(f)));
  section.appendChild(list);

  return section;
}

function renderSidebar(sections, meta) {
  const sb = document.getElementById('sidebar');
  const dn = document.getElementById('drawerNav');

  const navLinks = sections.map(([name]) => {
    const id  = sectionId(name);
    const num = name.match(/^(\d+)/)?.[1] || '';
    const lbl = name.replace(/^\d+\.\s*/, '');
    return `<a href="#${id}" class="nav-link">
      <span class="nav-num">${num}</span>
      <span>${lbl}</span>
    </a>`;
  }).join('');

  const stats = [
    ['Total fields',         meta.total],
    ['Required now (M1)',    meta.m1],
    ['Delegated act (M2)',   meta.m2],
    ['Non-ESPR (M3)',        meta.m3],
    ['Dynamic fields',       meta.dynamic],
  ].map(([l, v]) => `<div class="sb-stat"><span>${l}</span><span>${v}</span></div>`).join('');

  const links = `
    <a class="sb-link" href="https://github.com/rhys-the-davies/open-dpp" target="_blank" rel="noopener">GitHub repo ↗</a>
    <a class="sb-link" href="${DISCUSS_URL}" target="_blank" rel="noopener">Discussions ↗</a>
    <a class="sb-link" href="schema.json" target="_blank" rel="noopener">Raw JSON ↗</a>`;

  const html = `
    <div class="sb-label">Sections</div>
    ${navLinks}
    <div class="sb-divider"></div>
    <div class="sb-label">Summary</div>
    <div class="sb-stats">${stats}</div>
    <div class="sb-divider"></div>
    <div class="sb-label">Links</div>
    ${links}`;

  sb.innerHTML = html;
  dn.innerHTML = `<div class="sb-label">Sections</div>${navLinks}`;

  // Close drawer on nav click
  dn.querySelectorAll('.nav-link').forEach(a =>
    a.addEventListener('click', closeDrawer));
}

function renderIntro(meta) {
  return `<div class="intro">
    <h1>EU textile digital product passport — field schema</h1>
    <p>An open field schema for ESPR-compliant textile DPPs. The textile delegated act is pending — each field is marked by where its legal requirement currently sits.</p>
    <div class="legend">
      <div class="leg-card">
        <div class="leg-title">Mandate status</div>
        <div class="leg-item"><span class="badge b-m1">M1 — required now</span></div>
        <div class="leg-item"><span class="badge b-m2">M2 — delegated act pending</span></div>
        <div class="leg-item"><span class="badge b-m3">M3 — non-ESPR instrument</span></div>
      </div>
      <div class="leg-card">
        <div class="leg-title">Who can see this data</div>
        <div class="leg-item"><span class="badge b-public">Public</span><span style="font-size:11px;color:var(--earth3);margin-left:4px">Via QR code, no login</span></div>
        <div class="leg-item"><span class="badge b-auth">Authorities only</span><span style="font-size:11px;color:var(--earth3);margin-left:4px">Regulators</span></div>
        <div class="leg-item"><span class="badge b-legit">Legitimate interest</span><span style="font-size:11px;color:var(--earth3);margin-left:4px">Verified third parties</span></div>
      </div>
      <div class="leg-card">
        <div class="leg-title">Data behaviour</div>
        <div class="leg-item"><span class="badge b-static">Static</span><span style="font-size:11px;color:var(--earth3);margin-left:4px">Fixed at manufacture</span></div>
        <div class="leg-item"><span class="badge b-dynamic">Dynamic</span><span style="font-size:11px;color:var(--earth3);margin-left:4px">Updated through product life</span></div>
        <div class="leg-item"><span class="badge b-req">Required</span><span style="font-size:11px;color:var(--earth3);margin-left:4px">Mandatory under current ESPR</span></div>
      </div>
    </div>
  </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────

async function init() {
  const mainEl = document.getElementById('main');

  let schema;
  try {
    const res = await fetch(SCHEMA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    schema = await res.json();
  } catch (err) {
    mainEl.innerHTML = `<div class="state state-error">
      Could not load schema.json — ${err.message}.<br>
      <small>If opening locally, run a local server: <code>python3 -m http.server</code></small>
    </div>`;
    return;
  }

  const { 'x-meta': meta, fields } = schema;

  // Update topbar pills
  document.getElementById('hd-version').textContent = `v${meta.version}`;
  document.getElementById('hd-status').textContent  = meta.status;

  // Group fields by section, preserving order
  const sectionMap = new Map();
  for (const f of fields) {
    if (!sectionMap.has(f.section)) sectionMap.set(f.section, []);
    sectionMap.get(f.section).push(f);
  }
  const sections = [...sectionMap.entries()];

  // Compute stats
  const stats = {
    total:   fields.length,
    m1:      fields.filter(f => f.mandate_status === 'M1').length,
    m2:      fields.filter(f => f.mandate_status === 'M2').length,
    m3:      fields.filter(f => f.mandate_status === 'M3').length,
    dynamic: fields.filter(f => f.data_behaviour  === 'dynamic').length,
  };

  renderSidebar(sections, stats);

  // Build main content
  const fragment = document.createDocumentFragment();
  const introEl  = el('div');
  introEl.innerHTML = renderIntro(stats);
  fragment.appendChild(introEl);
  sections.forEach(([name, sFields]) =>
    fragment.appendChild(renderSection(name, sFields)));
  mainEl.innerHTML = '';
  mainEl.appendChild(fragment);

  // Active nav on scroll
  const allSections = mainEl.querySelectorAll('.schema-section');
  const allNavLinks = document.querySelectorAll('.sidebar .nav-link');
  const io = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (e.isIntersecting) {
        allNavLinks.forEach(l => l.classList.remove('active'));
        const active = document.querySelector(`.sidebar .nav-link[href="#${e.target.id}"]`);
        if (active) active.classList.add('active');
      }
    }
  }, { threshold: 0.2, rootMargin: '-48px 0px 0px 0px' });
  allSections.forEach(s => io.observe(s));
}

// ── Burger menu ───────────────────────────────────────────────────────────────

const drawer  = document.getElementById('drawer');
const overlay = document.getElementById('overlay');

function openDrawer()  {
  drawer.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  drawer.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('burgerBtn').addEventListener('click', openDrawer);
document.getElementById('drawerClose').addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);

// ── Boot ──────────────────────────────────────────────────────────────────────

init();
</script>
</body>
</html>
